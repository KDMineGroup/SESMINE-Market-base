<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020810">
  <title>Admin Access — SESMine</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #020810;
      --bg2:         #071020;
      --bg3:         #0a1628;
      --bg4:         #0f1f3d;
      --cyan:        #00D4FF;
      --cyan2:       #00A8CC;
      --cyan-dim:    rgba(0,212,255,0.10);
      --cyan-border: rgba(0,212,255,0.18);
      --red:         #FF4444;
      --red-dim:     rgba(255,68,68,0.10);
      --red-border:  rgba(255,68,68,0.25);
      --green:       #00FF88;
      --green-dim:   rgba(0,255,136,0.08);
      --text:        #E8F4FD;
      --text-muted:  #8BA3C7;
      --border:      rgba(0,212,255,0.12);
      --radius:      12px;
      --radius-lg:   18px;
      --radius-xl:   24px;
      --font-mono:   'JetBrains Mono', monospace;
      --font-head:   'Space Grotesk', sans-serif;
      --transition:  0.22s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: var(--font-head);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-img {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(0.1) brightness(0.2);
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(2,8,16,0.97), rgba(7,16,32,0.95));
      z-index: 1;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      z-index: 2;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 2;
    }

    .bg-glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,68,68,0.04) 0%, transparent 70%);
      top: -150px; right: -150px;
    }

    .bg-glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }

    /* ── Card ── */
    .admin-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 44px 40px;
      box-shadow:
        0 0 0 1px rgba(0,212,255,0.04),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0,212,255,0.03);
    }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--cyan), var(--cyan2));
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(0,212,255,0.25);
    }

    .logo-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-name span { color: var(--cyan); }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .admin-badge-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.8); }
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 5px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Security notice ── */
    .security-notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,68,68,0.05);
      border: 1px solid var(--red-border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 24px;
      font-size: 12px;
      color: rgba(255,136,136,0.9);
      line-height: 1.55;
    }

    .notice-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    /* ── Alert ── */
    .alert {
      display: none;
      align-items: flex-start;
      gap: 9px;
      padding: 11px 13px;
      border-radius: var(--radius);
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .alert.show { display: flex; }

    .alert-error {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      color: #FF8888;
    }

    .alert-success {
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.2);
      color: var(--green);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
      font-family: var(--font-mono);
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      opacity: 0.4;
    }

    .form-input {
      width: 100%;
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 42px 12px 40px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }

    .form-input.is-error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-dim);
    }

    .form-input::placeholder { color: rgba(139,163,199,0.3); }

    .btn-toggle {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color var(--transition);
      line-height: 1;
    }

    .btn-toggle:hover { color: var(--cyan); }

    /* ── 2FA ── */
    .mfa-section {
      display: none;
      margin-bottom: 16px;
    }

    .mfa-section.show { display: block; }

    .mfa-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-family: var(--font-mono);
    }

    .mfa-digits {
      display: flex;
      gap: 7px;
    }

    .mfa-digit {
      flex: 1;
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
    }

    .mfa-digit:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }

    /* ── Options ── */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: var(--cyan);
      cursor: pointer;
    }

    .reset-link {
      font-size: 12px;
      color: var(--cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      transition: opacity var(--transition);
    }

    .reset-link:hover { opacity: 0.7; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--cyan2));
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      color: #020810;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
    }

    .btn-submit:hover {
      box-shadow: 0 8px 24px rgba(0,212,255,0.3);
      transform: translateY(-1px);
    }

    .btn-submit:active { transform: scale(0.99); }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-submit .btn-text { transition: opacity 0.15s; }

    .btn-submit .btn-loader {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading .btn-loader { display: flex; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(2,8,16,0.3);
      border-top-color: #020810;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Attempt counter ── */
    .attempt-counter {
      text-align: center;
      font-family: var(--font-mono);
